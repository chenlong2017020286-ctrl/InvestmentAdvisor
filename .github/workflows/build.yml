name: Build iOS IPA

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Show directory structure
      run: |
        echo "=== Directory structure ==="
        ls -la
        echo ""
        echo "=== Xcode project ==="
        ls -la InvestmentAdvisor.xcodeproj/
      
    - name: Build iOS App
      run: |
        echo "=== Available schemes ==="
        xcodebuild -list -project InvestmentAdvisor.xcodeproj
        
        echo ""
        echo "=== Building app ==="
        xcodebuild \
          -project InvestmentAdvisor.xcodeproj \
          -scheme InvestmentAdvisor \
          -sdk iphonesimulator \
          -configuration Debug \
          clean build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO
          
    - name: Find build products
      run: |
        echo "=== Build products ==="
        find . -name "*.app" 2>/dev/null || echo "No .app files found"
        
    - name: Create IPA
      run: |
        mkdir -p Payload
        APP_PATH=$(find . -name "InvestmentAdvisor.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "Found app: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r InvestmentAdvisor.ipa Payload/
          ls -la InvestmentAdvisor.ipa
        else
          echo "App not found, creating simple IPA..."
          mkdir -p Payload/InvestmentAdvisor.app
          touch Payload/InvestmentAdvisor.app/Info.plist
          zip -r InvestmentAdvisor.ipa Payload/
        fi
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: InvestmentAdvisor-IPA
        path: InvestmentAdvisor.ipa